<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RainCast — Weather Prediction</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  /* ── Reset & Variables ───────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sky:      #0a0f1e;
    --sky-mid:  #0d1a35;
    --cloud:    #111e3a;
    --panel:    #0f1c38;
    --border:   rgba(99,175,255,0.12);
    --glow:     #3b82f6;
    --rain:     #60a5fa;
    --sun:      #fbbf24;
    --text:     #e2eaf8;
    --muted:    #5a7aaa;
    --input-bg: rgba(255,255,255,0.04);
    --accent:   #38bdf8;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--sky);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Animated Sky Background ─────────────────────────────────── */
  .sky-bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(59,130,246,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(96,165,250,0.10) 0%, transparent 55%),
      linear-gradient(175deg, #060c1a 0%, #0a1428 40%, #071020 100%);
  }

  /* Stars */
  .stars {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 5%,  rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 20%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 8%,  rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 25%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 45%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 35%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 50%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(2px 2px at 40% 60%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,0.5) 0%, transparent 100%);
  }

  /* Floating clouds */
  .cloud-layer {
    position: fixed; top: 0; left: 0; width: 200%; height: 100%; z-index: 0;
    animation: driftClouds 60s linear infinite;
    pointer-events: none;
  }
  .cloud-layer::before, .cloud-layer::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    background: rgba(99,175,255,0.04);
    filter: blur(40px);
  }
  .cloud-layer::before {
    width: 500px; height: 200px;
    top: 15%; left: 10%;
  }
  .cloud-layer::after {
    width: 700px; height: 250px;
    top: 35%; left: 55%;
    background: rgba(56,189,248,0.03);
  }
  @keyframes driftClouds {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  /* ── Layout ───────────────────────────────────────────────────── */
  .wrapper {
    position: relative; z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* ── Header ───────────────────────────────────────────────────── */
  header {
    text-align: center;
    margin-bottom: 52px;
    animation: fadeDown 0.8s ease both;
  }
  @keyframes fadeDown {
    from { opacity:0; transform: translateY(-24px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .logo-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 10px;
  }

  .logo-icon {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, #1d4ed8, #0ea5e9);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    box-shadow: 0 0 32px rgba(59,130,246,0.4);
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 8vw, 5.5rem);
    letter-spacing: 0.06em;
    line-height: 1;
    background: linear-gradient(90deg, #e2eaf8 30%, #60a5fa 70%, #38bdf8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 0.95rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 300;
    margin-top: 6px;
  }

  /* ── Form Card ────────────────────────────────────────────────── */
  .card {
    background: linear-gradient(145deg, rgba(15,28,56,0.9), rgba(10,20,40,0.95));
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 40px 36px;
    backdrop-filter: blur(20px);
    box-shadow:
      0 0 0 1px rgba(99,175,255,0.06),
      0 32px 64px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.06);
    animation: fadeUp 0.9s ease 0.2s both;
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(32px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* ── Section Headers ─────────────────────────────────────────── */
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
    margin-top: 32px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label:first-child { margin-top: 0; }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  /* ── Grid ─────────────────────────────────────────────────────── */
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px 20px;
  }
  .grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px 20px;
  }
  .grid-4 {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px 20px;
  }

  @media (max-width: 680px) {
    .card { padding: 28px 20px; }
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 420px) {
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  }

  /* ── Field ────────────────────────────────────────────────────── */
  .field { display: flex; flex-direction: column; gap: 7px; }

  label {
    font-size: 0.76rem;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  label .icon { font-size: 13px; opacity: 0.7; }

  input, select {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    width: 100%;
    appearance: none;
    -webkit-appearance: none;
  }
  input::placeholder { color: rgba(90,122,170,0.5); }

  input:hover, select:hover {
    border-color: rgba(99,175,255,0.25);
    background: rgba(255,255,255,0.06);
  }
  input:focus, select:focus {
    border-color: var(--glow);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15), 0 0 12px rgba(59,130,246,0.1);
    background: rgba(255,255,255,0.07);
  }

  select option {
    background: #0d1a35;
    color: var(--text);
  }

  /* Select arrow */
  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    font-size: 12px;
  }

  /* ── Divider ─────────────────────────────────────────────────── */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 32px 0;
  }

  /* ── Submit Button ───────────────────────────────────────────── */
  .btn-wrap {
    margin-top: 36px;
    display: flex;
    justify-content: center;
  }

  button[type="submit"] {
    background: linear-gradient(135deg, #1d4ed8 0%, #0ea5e9 100%);
    border: none;
    border-radius: 14px;
    padding: 16px 52px;
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 32px rgba(14,165,233,0.3), 0 4px 16px rgba(0,0,0,0.4);
  }
  button[type="submit"]::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  button[type="submit"]:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 48px rgba(14,165,233,0.5), 0 8px 24px rgba(0,0,0,0.4);
  }
  button[type="submit"]:hover::before { opacity: 1; }
  button[type="submit"]:active { transform: translateY(0); }

  button[type="submit"].loading {
    pointer-events: none;
    opacity: 0.7;
  }

  /* ── Result Panel ────────────────────────────────────────────── */
  #result {
    margin-top: 32px;
    border-radius: 20px;
    overflow: hidden;
    display: none;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  #result.show { display: block; }

  @keyframes popIn {
    from { opacity:0; transform: scale(0.92) translateY(16px); }
    to   { opacity:1; transform: scale(1) translateY(0); }
  }

  .result-inner {
    padding: 32px 36px;
    border: 1px solid;
    border-radius: 20px;
    position: relative;
    overflow: hidden;
  }
  .result-inner::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.06;
    background-size: 30px 30px;
  }

  .result-inner.rain {
    border-color: rgba(96,165,250,0.4);
    background: linear-gradient(135deg, rgba(29,78,216,0.2), rgba(14,165,233,0.15));
  }
  .result-inner.rain::before {
    background-image:
      linear-gradient(rgba(96,165,250,0.3) 1px, transparent 1px),
      linear-gradient(90deg, rgba(96,165,250,0.3) 1px, transparent 1px);
  }

  .result-inner.sun {
    border-color: rgba(251,191,36,0.35);
    background: linear-gradient(135deg, rgba(120,53,15,0.25), rgba(180,83,9,0.15));
  }
  .result-inner.sun::before {
    background-image: radial-gradient(rgba(251,191,36,0.25) 1px, transparent 1px);
    background-size: 20px 20px;
  }

  .result-emoji {
    font-size: 4rem;
    display: block;
    margin-bottom: 12px;
    animation: bounce 0.6s ease 0.3s both;
  }
  @keyframes bounce {
    0%   { transform: scale(0) rotate(-10deg); }
    70%  { transform: scale(1.2) rotate(5deg); }
    100% { transform: scale(1) rotate(0); }
  }

  .result-verdict {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    letter-spacing: 0.06em;
    line-height: 1;
    margin-bottom: 8px;
  }
  .result-inner.rain  .result-verdict { color: #93c5fd; }
  .result-inner.sun   .result-verdict { color: #fde68a; }

  .result-sub {
    color: var(--muted);
    font-size: 0.88rem;
    margin-bottom: 24px;
    font-weight: 300;
  }

  /* Probability bars */
  .prob-bars { display: flex; flex-direction: column; gap: 12px; }

  .prob-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .prob-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    width: 70px;
    flex-shrink: 0;
  }
  .prob-track {
    flex: 1;
    height: 8px;
    background: rgba(255,255,255,0.07);
    border-radius: 99px;
    overflow: hidden;
  }
  .prob-fill {
    height: 100%;
    border-radius: 99px;
    width: 0%;
    transition: width 1.2s cubic-bezier(0.25, 1, 0.5, 1);
  }
  .prob-fill.rain-fill { background: linear-gradient(90deg, #3b82f6, #38bdf8); }
  .prob-fill.sun-fill  { background: linear-gradient(90deg, #f59e0b, #fbbf24); }

  .prob-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    font-weight: 600;
    width: 48px;
    text-align: right;
  }
  .prob-fill.rain-fill ~ .prob-pct,
  .rain-pct { color: #60a5fa; }
  .sun-pct  { color: #fbbf24; }

  /* Error */
  .error-box {
    margin-top: 20px;
    padding: 16px 20px;
    border-radius: 12px;
    background: rgba(220,38,38,0.1);
    border: 1px solid rgba(220,38,38,0.3);
    color: #fca5a5;
    font-size: 0.88rem;
    display: none;
    animation: fadeUp 0.3s ease both;
  }
  .error-box.show { display: block; }

  /* ── Footer ───────────────────────────────────────────────────── */
  footer {
    text-align: center;
    margin-top: 52px;
    color: var(--muted);
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    opacity: 0.6;
  }

  /* Rain animation overlay on predict */
  .rain-drops {
    position: fixed; inset: 0; pointer-events: none; z-index: 999;
    display: none;
  }
  .rain-drops.active { display: block; }
  .drop {
    position: absolute;
    top: -20px;
    width: 2px;
    background: linear-gradient(to bottom, transparent, rgba(96,165,250,0.6));
    border-radius: 99px;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh); opacity: 0; }
  }
</style>
</head>
<body>

<div class="sky-bg"></div>
<div class="stars"></div>
<div class="cloud-layer"></div>
<div class="rain-drops" id="rainDrops"></div>

<div class="wrapper">

  <!-- Header -->
  <header>
    <div class="logo-line">
      <div class="logo-icon">🌩️</div>
      <h1>RainCast</h1>
    </div>
    <p class="subtitle">AI-Powered Weather Prediction · By MD. Pranto025</p>
    <p style="font-size:0.82rem; color:var(--muted); margin-top:6px;">
      Enter today's weather data to see the prediction for tomorrow.
    </p>
  </header>

  <!-- Form -->
  <div class="card">
    <form id="weatherForm">

      <!-- Location -->
      <div class="section-label">📍 Location</div>
      <div class="grid-2">
        <div class="field">
          <label><span class="icon">🗺️</span> Location ID</label>
          <div class="select-wrap">
            <select name="Location" required>
              <option value="" disabled selected>Select location</option>
              <option value="0">Adelaide</option>
              <option value="1">Albany</option>
              <option value="2">Albury</option>
              <option value="3">AliceSprings</option>
              <option value="4">BadgerysCreek</option>
              <option value="5">Ballarat</option>
              <option value="6">Bendigo</option>
              <option value="7">Brisbane</option>
              <option value="8">Cairns</option>
              <option value="9">Canberra</option>
              <option value="10">Cobar</option>
              <option value="11">CoffsHarbour</option>
              <option value="12">Darwin</option>
              <option value="13">GoldCoast</option>
              <option value="14">Hobart</option>
              <option value="15">Katherine</option>
              <option value="16">Launceston</option>
              <option value="17">Melbourne</option>
              <option value="18">MelbourneAirport</option>
              <option value="19">Mildura</option>
              <option value="20">Moree</option>
              <option value="21">MountGambier</option>
              <option value="22">MountGinini</option>
              <option value="23">Newcastle</option>
              <option value="24">Nhil</option>
              <option value="25">NorahHead</option>
              <option value="26">NorfolkIsland</option>
              <option value="27">Nuriootpa</option>
              <option value="28">PearceRAAF</option>
              <option value="29">Penrith</option>
              <option value="30">Perth</option>
              <option value="31">PerthAirport</option>
              <option value="32">Portland</option>
              <option value="33">Richmond</option>
              <option value="34">Sale</option>
              <option value="35">SalmonGums</option>
              <option value="36">Sydney</option>
              <option value="37">SydneyAirport</option>
              <option value="38">Townsville</option>
              <option value="39">Tuggeranong</option>
              <option value="40">Uluru</option>
              <option value="41">WaggaWagga</option>
              <option value="42">Walpole</option>
              <option value="43">Watsonia</option>
              <option value="44">Williamtown</option>
              <option value="45">Witchcliffe</option>
              <option value="46">Wollongong</option>
              <option value="47">Woomera</option>
            </select>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Temperature -->
      <div class="section-label">🌡️ Temperature</div>
      <div class="grid-4">
        <div class="field">
          <label><span class="icon">🔽</span> Min Temp (°C)</label>
          <input type="number" name="MinTemp" placeholder="e.g. 13.4" step="0.1" required/>
        </div>
        <div class="field">
          <label><span class="icon">🔼</span> Max Temp (°C)</label>
          <input type="number" name="MaxTemp" placeholder="e.g. 22.9" step="0.1" required/>
        </div>
        <div class="field">
          <label><span class="icon">🌡</span> Temp 9am (°C)</label>
          <input type="number" name="Temp9am" placeholder="e.g. 16.9" step="0.1" required/>
        </div>
        <div class="field">
          <label><span class="icon">🌡</span> Temp 3pm (°C)</label>
          <input type="number" name="Temp3pm" placeholder="e.g. 21.8" step="0.1" required/>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Atmosphere -->
      <div class="section-label">☁️ Atmosphere</div>
      <div class="grid-4">
        <div class="field">
          <label><span class="icon">🌧</span> Rainfall (mm)</label>
          <input type="number" name="Rainfall" placeholder="e.g. 0.6" step="0.1" min="0" required/>
        </div>
        <div class="field">
          <label><span class="icon">💧</span> Evaporation (mm)</label>
          <input type="number" name="Evaporation" placeholder="e.g. 5.0" step="0.1" min="0" required/>
        </div>
        <div class="field">
          <label><span class="icon">☀️</span> Sunshine (hrs)</label>
          <input type="number" name="Sunshine" placeholder="e.g. 7.0" step="0.1" min="0" max="24" required/>
        </div>
      </div>

      <div class="grid-4" style="margin-top:14px">
        <div class="field">
          <label><span class="icon">🌫</span> Cloud 9am</label>
          <input type="number" name="Cloud9am" placeholder="0–8 oktas" step="1" min="0" max="8" required/>
        </div>
        <div class="field">
          <label><span class="icon">🌫</span> Cloud 3pm</label>
          <input type="number" name="Cloud3pm" placeholder="0–8 oktas" step="1" min="0" max="8" required/>
        </div>
        <div class="field">
          <label><span class="icon">📊</span> Pressure 9am</label>
          <input type="number" name="Pressure9am" placeholder="e.g. 1007.7" step="0.1" required/>
        </div>
        <div class="field">
          <label><span class="icon">📊</span> Pressure 3pm</label>
          <input type="number" name="Pressure3pm" placeholder="e.g. 1007.1" step="0.1" required/>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Humidity -->
      <div class="section-label">💦 Humidity</div>
      <div class="grid-2">
        <div class="field">
          <label><span class="icon">🌅</span> Humidity 9am (%)</label>
          <input type="number" name="Humidity9am" placeholder="e.g. 71" step="1" min="0" max="100" required/>
        </div>
        <div class="field">
          <label><span class="icon">🌆</span> Humidity 3pm (%)</label>
          <input type="number" name="Humidity3pm" placeholder="e.g. 22" step="1" min="0" max="100" required/>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Wind -->
      <div class="section-label">💨 Wind</div>
      <div class="grid-4">
        <div class="field">
          <label><span class="icon">🌬</span> Gust Dir</label>
          <div class="select-wrap">
            <select name="WindGustDir" required>
              <option value="" disabled selected>Direction</option>
              <option value="0">E</option><option value="1">ENE</option>
              <option value="2">ESE</option><option value="3">N</option>
              <option value="4">NE</option><option value="5">NNE</option>
              <option value="6">NNW</option><option value="7">NW</option>
              <option value="8">S</option><option value="9">SE</option>
              <option value="10">SSE</option><option value="11">SSW</option>
              <option value="12">SW</option><option value="13">W</option>
              <option value="14">WNW</option><option value="15">WSW</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label><span class="icon">💨</span> Gust Speed</label>
          <input type="number" name="WindGustSpeed" placeholder="km/h" step="1" min="0" required/>
        </div>
        <div class="field">
          <label><span class="icon">🧭</span> Wind Dir 9am</label>
          <div class="select-wrap">
            <select name="WindDir9am" required>
              <option value="" disabled selected>Direction</option>
              <option value="0">E</option><option value="1">ENE</option>
              <option value="2">ESE</option><option value="3">N</option>
              <option value="4">NE</option><option value="5">NNE</option>
              <option value="6">NNW</option><option value="7">NW</option>
              <option value="8">S</option><option value="9">SE</option>
              <option value="10">SSE</option><option value="11">SSW</option>
              <option value="12">SW</option><option value="13">W</option>
              <option value="14">WNW</option><option value="15">WSW</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label><span class="icon">🧭</span> Wind Dir 3pm</label>
          <div class="select-wrap">
            <select name="WindDir3pm" required>
              <option value="" disabled selected>Direction</option>
              <option value="0">E</option><option value="1">ENE</option>
              <option value="2">ESE</option><option value="3">N</option>
              <option value="4">NE</option><option value="5">NNE</option>
              <option value="6">NNW</option><option value="7">NW</option>
              <option value="8">S</option><option value="9">SE</option>
              <option value="10">SSE</option><option value="11">SSW</option>
              <option value="12">SW</option><option value="13">W</option>
              <option value="14">WNW</option><option value="15">WSW</option>
            </select>
          </div>
        </div>
      </div>

      <div class="grid-2" style="margin-top:14px">
        <div class="field">
          <label><span class="icon">🌀</span> Wind Speed 9am (km/h)</label>
          <input type="number" name="WindSpeed9am" placeholder="e.g. 20" step="1" min="0" required/>
        </div>
        <div class="field">
          <label><span class="icon">🌀</span> Wind Speed 3pm (km/h)</label>
          <input type="number" name="WindSpeed3pm" placeholder="e.g. 24" step="1" min="0" required/>
        </div>
      </div>

      <!-- Submit -->
      <div class="btn-wrap">
        <button type="submit" id="submitBtn">
          ⚡ PREDICT TOMORROW
        </button>
      </div>

    </form>

    <!-- Error -->
    <div class="error-box" id="errorBox"></div>

    <!-- Result -->
    <div id="result">
      <div class="result-inner" id="resultInner">
        <span class="result-emoji" id="resultEmoji"></span>
        <div class="result-verdict" id="resultVerdict"></div>
        <div class="result-sub" id="resultSub"></div>
        <div class="prob-bars">
          <div class="prob-row">
            <span class="prob-label">🌧 Rain</span>
            <div class="prob-track">
              <div class="prob-fill rain-fill" id="rainBar"></div>
            </div>
            <span class="prob-pct rain-pct" id="rainPct">—</span>
          </div>
          <div class="prob-row">
            <span class="prob-label">☀️ Clear</span>
            <div class="prob-track">
              <div class="prob-fill sun-fill" id="sunBar"></div>
            </div>
            <span class="prob-pct sun-pct" id="sunPct">—</span>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /.card -->

  <footer>RainCast · Logistic Regression Model · Australian Weather Dataset</footer>

</div><!-- /.wrapper -->

<script>
  const API = 'http://127.0.0.1:8000/predict';

  document.getElementById('weatherForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const btn   = document.getElementById('submitBtn');
    const errBox = document.getElementById('errorBox');
    const result = document.getElementById('result');

    // Reset
    errBox.classList.remove('show');
    result.classList.remove('show');
    btn.classList.add('loading');
    btn.textContent = '⏳ PREDICTING...';

    // Collect values
    const fd = new FormData(e.target);
    const payload = {};
    for (const [k,v] of fd.entries()) payload[k] = parseFloat(v);

    try {
      const res  = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || `HTTP ${res.status}`);
      }

      const data = await res.json();
      showResult(data);

    } catch (err) {
      errBox.textContent = '⚠️  ' + (err.message || 'Could not reach the API. Make sure FastAPI is running on http://127.0.0.1:8000');
      errBox.classList.add('show');
    } finally {
      btn.classList.remove('loading');
      btn.textContent = '⚡ PREDICT TOMORROW';
    }
  });

  function showResult(data) {
    const isRain   = data.prediction === 1;
    const inner    = document.getElementById('resultInner');
    const emoji    = document.getElementById('resultEmoji');
    const verdict  = document.getElementById('resultVerdict');
    const sub      = document.getElementById('resultSub');
    const rainBar  = document.getElementById('rainBar');
    const sunBar   = document.getElementById('sunBar');
    const rainPct  = document.getElementById('rainPct');
    const sunPct   = document.getElementById('sunPct');

    inner.className = 'result-inner ' + (isRain ? 'rain' : 'sun');
    emoji.textContent   = isRain ? '🌧️' : '☀️';
    verdict.textContent = isRain ? 'RAIN EXPECTED TOMORROW' : 'CLEAR SKIES TOMORROW';
    sub.textContent     = isRain
      ? `High chance of precipitation — consider carrying an umbrella.`
      : `Enjoy the sunshine — no rain in the forecast.`;

    // Animate bars (slight delay for pop-in)
    setTimeout(() => {
      rainBar.style.width = data.probability_rain + '%';
      sunBar.style.width  = data.probability_no_rain + '%';
    }, 300);

    rainPct.textContent = data.probability_rain + '%';
    sunPct.textContent  = data.probability_no_rain + '%';

    const result = document.getElementById('result');
    result.classList.add('show');
    result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    // Trigger rain effect if rain predicted
    if (isRain) spawnRain();
  }

  function spawnRain() {
    const container = document.getElementById('rainDrops');
    container.innerHTML = '';
    container.classList.add('active');

    for (let i = 0; i < 60; i++) {
      const drop = document.createElement('div');
      drop.className = 'drop';
      const left   = Math.random() * 100;
      const delay  = Math.random() * 1.2;
      const dur    = 0.6 + Math.random() * 0.8;
      const height = 20 + Math.random() * 50;
      drop.style.cssText = `
        left: ${left}vw;
        height: ${height}px;
        animation-duration: ${dur}s;
        animation-delay: ${delay}s;
      `;
      container.appendChild(drop);
    }

    setTimeout(() => {
      container.classList.remove('active');
      container.innerHTML = '';
    }, 2800);
  }
</script>
</body>
</html>
