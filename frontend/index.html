<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RainCast — Weather Prediction</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- Background layers -->
  <div class="sky-bg"></div>
  <div class="stars"></div>
  <div class="cloud-layer"></div>
  <div class="rain-drops" id="rainDrops"></div>

  <div class="wrapper">

    <!-- ── Header ── -->
    <header>
      <div class="logo-line">
        <div class="logo-icon">🌩️</div>
        <h1>RainCast</h1>
      </div>
      <p class="subtitle">AI-Powered Weather Prediction · by Md.Pranto025 </p>
      <p class="description">Enter today's weather data to predict if it will rain tomorrow!</p>
    </header>

    <!-- ── Form Card ── -->
    <div class="card">
      <form id="weatherForm">

        <!-- Location -->
        <div class="section-label">📍 Location</div>
        <div class="grid-2">
          <div class="field">
            <label><span class="icon">🗺️</span> Location ID</label>
            <div class="select-wrap">
              <select name="Location" required>
                <option value="" disabled selected>Select location</option>
                <option value="0">Adelaide</option>
                <option value="1">Albany</option>
                <option value="2">Albury</option>
                <option value="3">AliceSprings</option>
                <option value="4">BadgerysCreek</option>
                <option value="5">Ballarat</option>
                <option value="6">Bendigo</option>
                <option value="7">Brisbane</option>
                <option value="8">Cairns</option>
                <option value="9">Canberra</option>
                <option value="10">Cobar</option>
                <option value="11">CoffsHarbour</option>
                <option value="12">Darwin</option>
                <option value="13">GoldCoast</option>
                <option value="14">Hobart</option>
                <option value="15">Katherine</option>
                <option value="16">Launceston</option>
                <option value="17">Melbourne</option>
                <option value="18">MelbourneAirport</option>
                <option value="19">Mildura</option>
                <option value="20">Moree</option>
                <option value="21">MountGambier</option>
                <option value="22">MountGinini</option>
                <option value="23">Newcastle</option>
                <option value="24">Nhil</option>
                <option value="25">NorahHead</option>
                <option value="26">NorfolkIsland</option>
                <option value="27">Nuriootpa</option>
                <option value="28">PearceRAAF</option>
                <option value="29">Penrith</option>
                <option value="30">Perth</option>
                <option value="31">PerthAirport</option>
                <option value="32">Portland</option>
                <option value="33">Richmond</option>
                <option value="34">Sale</option>
                <option value="35">SalmonGums</option>
                <option value="36">Sydney</option>
                <option value="37">SydneyAirport</option>
                <option value="38">Townsville</option>
                <option value="39">Tuggeranong</option>
                <option value="40">Uluru</option>
                <option value="41">WaggaWagga</option>
                <option value="42">Walpole</option>
                <option value="43">Watsonia</option>
                <option value="44">Williamtown</option>
                <option value="45">Witchcliffe</option>
                <option value="46">Wollongong</option>
                <option value="47">Woomera</option>
              </select>
            </div>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Temperature -->
        <div class="section-label">🌡️ Temperature</div>
        <div class="grid-4">
          <div class="field">
            <label><span class="icon">🔽</span> Min Temp (°C)</label>
            <input type="number" name="MinTemp" placeholder="e.g. 13.4" step="0.1" required/>
          </div>
          <div class="field">
            <label><span class="icon">🔼</span> Max Temp (°C)</label>
            <input type="number" name="MaxTemp" placeholder="e.g. 22.9" step="0.1" required/>
          </div>
          <div class="field">
            <label><span class="icon">🌡</span> Temp 9am (°C)</label>
            <input type="number" name="Temp9am" placeholder="e.g. 16.9" step="0.1" required/>
          </div>
          <div class="field">
            <label><span class="icon">🌡</span> Temp 3pm (°C)</label>
            <input type="number" name="Temp3pm" placeholder="e.g. 21.8" step="0.1" required/>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Atmosphere -->
        <div class="section-label">☁️ Atmosphere</div>
        <div class="grid-4">
          <div class="field">
            <label><span class="icon">🌧</span> Rainfall (mm)</label>
            <input type="number" name="Rainfall" placeholder="e.g. 0.6" step="0.1" min="0" required/>
          </div>
          <div class="field">
            <label><span class="icon">💧</span> Evaporation (mm)</label>
            <input type="number" name="Evaporation" placeholder="e.g. 5.0" step="0.1" min="0" required/>
          </div>
          <div class="field">
            <label><span class="icon">☀️</span> Sunshine (hrs)</label>
            <input type="number" name="Sunshine" placeholder="e.g. 7.0" step="0.1" min="0" max="24" required/>
          </div>
        </div>

        <div class="grid-4" style="margin-top:14px">
          <div class="field">
            <label><span class="icon">🌫</span> Cloud 9am</label>
            <input type="number" name="Cloud9am" placeholder="0–8 oktas" step="1" min="0" max="8" required/>
          </div>
          <div class="field">
            <label><span class="icon">🌫</span> Cloud 3pm</label>
            <input type="number" name="Cloud3pm" placeholder="0–8 oktas" step="1" min="0" max="8" required/>
          </div>
          <div class="field">
            <label><span class="icon">📊</span> Pressure 9am</label>
            <input type="number" name="Pressure9am" placeholder="e.g. 1007.7" step="0.1" required/>
          </div>
          <div class="field">
            <label><span class="icon">📊</span> Pressure 3pm</label>
            <input type="number" name="Pressure3pm" placeholder="e.g. 1007.1" step="0.1" required/>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Humidity -->
        <div class="section-label">💦 Humidity</div>
        <div class="grid-2">
          <div class="field">
            <label><span class="icon">🌅</span> Humidity 9am (%)</label>
            <input type="number" name="Humidity9am" placeholder="e.g. 71" step="1" min="0" max="100" required/>
          </div>
          <div class="field">
            <label><span class="icon">🌆</span> Humidity 3pm (%)</label>
            <input type="number" name="Humidity3pm" placeholder="e.g. 22" step="1" min="0" max="100" required/>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Wind -->
        <div class="section-label">💨 Wind</div>
        <div class="grid-4">
          <div class="field">
            <label><span class="icon">🌬</span> Gust Dir</label>
            <div class="select-wrap">
              <select name="WindGustDir" required>
                <option value="" disabled selected>Direction</option>
                <option value="0">E</option>
                <option value="1">ENE</option>
                <option value="2">ESE</option>
                <option value="3">N</option>
                <option value="4">NE</option>
                <option value="5">NNE</option>
                <option value="6">NNW</option>
                <option value="7">NW</option>
                <option value="8">S</option>
                <option value="9">SE</option>
                <option value="10">SSE</option>
                <option value="11">SSW</option>
                <option value="12">SW</option>
                <option value="13">W</option>
                <option value="14">WNW</option>
                <option value="15">WSW</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label><span class="icon">💨</span> Gust Speed (km/h)</label>
            <input type="number" name="WindGustSpeed" placeholder="e.g. 44" step="1" min="0" required/>
          </div>
          <div class="field">
            <label><span class="icon">🧭</span> Wind Dir 9am</label>
            <div class="select-wrap">
              <select name="WindDir9am" required>
                <option value="" disabled selected>Direction</option>
                <option value="0">E</option>
                <option value="1">ENE</option>
                <option value="2">ESE</option>
                <option value="3">N</option>
                <option value="4">NE</option>
                <option value="5">NNE</option>
                <option value="6">NNW</option>
                <option value="7">NW</option>
                <option value="8">S</option>
                <option value="9">SE</option>
                <option value="10">SSE</option>
                <option value="11">SSW</option>
                <option value="12">SW</option>
                <option value="13">W</option>
                <option value="14">WNW</option>
                <option value="15">WSW</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label><span class="icon">🧭</span> Wind Dir 3pm</label>
            <div class="select-wrap">
              <select name="WindDir3pm" required>
                <option value="" disabled selected>Direction</option>
                <option value="0">E</option>
                <option value="1">ENE</option>
                <option value="2">ESE</option>
                <option value="3">N</option>
                <option value="4">NE</option>
                <option value="5">NNE</option>
                <option value="6">NNW</option>
                <option value="7">NW</option>
                <option value="8">S</option>
                <option value="9">SE</option>
                <option value="10">SSE</option>
                <option value="11">SSW</option>
                <option value="12">SW</option>
                <option value="13">W</option>
                <option value="14">WNW</option>
                <option value="15">WSW</option>
              </select>
            </div>
          </div>
        </div>

        <div class="grid-2" style="margin-top:14px">
          <div class="field">
            <label><span class="icon">🌀</span> Wind Speed 9am (km/h)</label>
            <input type="number" name="WindSpeed9am" placeholder="e.g. 20" step="1" min="0" required/>
          </div>
          <div class="field">
            <label><span class="icon">🌀</span> Wind Speed 3pm (km/h)</label>
            <input type="number" name="WindSpeed3pm" placeholder="e.g. 24" step="1" min="0" required/>
          </div>
        </div>

        <!-- Submit -->
        <div class="btn-wrap">
          <button type="submit" id="submitBtn">⚡ PREDICT TOMORROW</button>
        </div>

      </form>

      <!-- Error -->
      <div class="error-box" id="errorBox"></div>

      <!-- Result -->
      <div id="result">
        <div class="result-inner" id="resultInner">
          <span class="result-emoji" id="resultEmoji"></span>
          <div class="result-verdict" id="resultVerdict"></div>
          <div class="result-sub" id="resultSub"></div>
          <div class="prob-bars">
            <div class="prob-row">
              <span class="prob-label">🌧 Rain</span>
              <div class="prob-track">
                <div class="prob-fill rain-fill" id="rainBar"></div>
              </div>
              <span class="prob-pct rain-pct" id="rainPct">—</span>
            </div>
            <div class="prob-row">
              <span class="prob-label">☀️ Clear</span>
              <div class="prob-track">
                <div class="prob-fill sun-fill" id="sunBar"></div>
              </div>
              <span class="prob-pct sun-pct" id="sunPct">—</span>
            </div>
          </div>
        </div>
      </div>

    </div><!-- /.card -->

    <footer>RainCast · Logistic Regression Model · Australian Weather Dataset</footer>

  </div><!-- /.wrapper -->

  <script src="script.js"></script>
</body>
</html>
